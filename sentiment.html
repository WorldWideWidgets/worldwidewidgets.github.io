<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Salad Detection | Compliments of Noir Analysis</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <!-- Link to your main site CSS -->
    <link rel="stylesheet" href="/css/main.css">
    <!-- Specific styles for this page -->
    <link rel="stylesheet" href="/css/sentiment.css">
</head>
<body>

<div id="header-site"></div>

<main class="container">
    <nav class="back-nav"><a href="/index.html">← Back to Home</a></nav>

    <div class="decoder-card">
        <h2 class="noir-title">
            <span class="accent-green">J</span>argon
            <span class="accent-green">B</span>uster
        </h2>
        <p class="noir-subtitle">Delivering the good and bad news about the writing style</p>

        <div id="status-container">
            <div id="status">Initializing Jargon Buster...</div>
            <div class="progress-bg"><div id="progress" class="progress-bar"></div></div>
        </div>

        <div class="input-group">
            <textarea id="input-text" placeholder="Target text here... (e.g., a tweet '@youwiththeface Oh, the nerve....', or an email  'Per my last email...')"></textarea>
        </div>

        <div class="controls">
            <button id="analyze-btn" class="noir-button" disabled>Loading AI Model...</button>
        </div>

        <div id="output" class="hidden">
            <div class="result-item">
                <span class="label">Literal Text:</span>
                <span id="literal-out"></span>
            </div>
            <div class="result-item highlight">
                <span class="label">Pragmatic Intent:</span>
                <span id="intent-out"></span>
            </div>
            <div class="result-item">
                <span class="label">Quality Check:</span>
                <span id="score-out"></span>
            </div>
        </div>
    </div>
</main>

<div id="footer-site"></div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
